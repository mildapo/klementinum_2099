<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klementinum 2099</title>
    <!-- Tailwind CSS pro stylování -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React a ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel pro překlad JSX v prohlížeči -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- FontAwesome pro ikony -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes pulseFast { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .animate-pulse-fast { animation: pulseFast 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-50 font-sans selection:bg-fuchsia-500/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- IKONY (Náhrada za Lucide React) ---
        const Icon = ({ name, size, className }) => (
            <i className={`fa-solid ${name} ${className || ''}`} style={size ? { fontSize: size } : {}}></i>
        );
        const Shield = ({size, className}) => <Icon name="fa-shield-halved" size={size} className={className} />;
        const Zap = ({size, className}) => <Icon name="fa-bolt" size={size} className={className} />;
        const Brain = ({size, className}) => <Icon name="fa-brain" size={size} className={className} />;
        const Crosshair = ({size, className}) => <Icon name="fa-crosshairs" size={size} className={className} />;
        const Map = ({size, className}) => <Icon name="fa-map" size={size} className={className} />;
        const Terminal = ({size, className}) => <Icon name="fa-terminal" size={size} className={className} />;
        const AlertTriangle = ({size, className}) => <Icon name="fa-triangle-exclamation" size={size} className={className} />;
        const ArrowRight = ({size, className}) => <Icon name="fa-arrow-right" size={size} className={className} />;
        const Play = ({size, className}) => <Icon name="fa-play" size={size} className={className} />;
        const CheckCircle2 = ({size, className}) => <Icon name="fa-circle-check" size={size} className={className} />;
        const XCircle = ({size, className}) => <Icon name="fa-circle-xmark" size={size} className={className} />;

        // --- HERNÍ DATA ---
        const GAME_DATA = [
          {
            id: 1,
            title: "Level 1: Teoretické základy",
            location: "Surrealistická Univerzita",
            description: "Vstupuješ do simulace Klementina. Tvá první cesta vede přes Surrealistickou Univerzitu. Musíš si zapamatovat klíčové pojmy a ukotvit je v prostoru.",
            rooms: [
              { anchor: "Vstupní brána", concept: "Znak", sensory: "Neonový ukazující prst, co píchá do hrudi a zanechává svítící stopu.", text: "Stojíš před Tepanou bránou univerzity. Místo uvítací cedule tu visí gigantický, pulzující neonový znak ve tvaru obřího ukazujícího prstu. Neon hlasitě vrčí, píchne tě do hrudi a zanechá na tvém oblečení svítící stopu." },
              { anchor: "Studentská šatna", concept: "Jazyk", sensory: "Obří slizký sval visící na háčku, chutná po jahodách.", text: "Vejdeš dovnitř a zamíříš do Studentské šatny. Místo kabátů tu na háčcích visí obrovské, slizké, růžové svaly. Je to živý jazyk, který neustále plácá a drmolí. Jeden z nich tě s hlasitým mlasknutím olízne od hlavy až k patě." },
              { anchor: "Informační pult", concept: "Informace", sensory: "Robot chrlící ostré děrné štítky jako konfety.", text: "Znechuceně uhneš k Hlavnímu informačnímu pultu. Za ním sedí robotický úředník, kterému z úst místo slov tryskají ostré štítky a děrné štítky. Je to čistá informace, která na tebe prší jako kovové konfety." },
              { anchor: "Tichá čítárna", concept: "Poznání", sensory: "Živý mozek chroupající knihy, smrdí jako starý prach.", text: "Utíkáš do Tiché čítárny. Tam na masivním dubovém stole sedí obrovský, pulzující mozek s brýlemi. Hladově požírá encyklopedie, drtí je zuby a hlasitě u toho chroupá." },
              { anchor: "Temný suterén", concept: "Entropie", sensory: "Ohnivé tornádo z knih a hodin, řve to a pálí.", text: "Aby ses schoval, sejdeš do Temného suterénu. Tady ale vládne totální chaos. Je tu ohnivé tornádo, ve kterém se mísí hořící učebnice s tekoucími hodinami. Tato entropie rve uši neuvěřitelným řevem." },
              { anchor: "Prosklený výtah", concept: "Inteligence", sensory: "Šimpanz skládající rubikovu kostku, modrá aura.", text: "Rychle skočíš do Proskleného výtahu, abys unikl. Uvnitř už ale sedí šimpanz ve smokingu, který rychlostí světla skládá rubikovu kostku. Jeho oslňující inteligence z něj doslova září jako modrá aura." },
              { anchor: "Zkušební laboratoř", concept: "Výzkum", sensory: "Vědec s lupou šťouchající do ječící améby.", text: "Výtah zastaví a ty vpadneš do Zkušební laboratoře. Šílený vědec tu obrovskou lupou propaluje a šťouchá do gigantické, ječící améby. Provádí na ní brutální výzkum." },
              { anchor: "Observatoř ve věži", concept: "Epistemologie", sensory: "Biskup rozbíjející skleněný strop svítícím mečem.", text: "Běžíš dál po točitých schodech až do Kruhové observatoře ve věži. Tam stojí rozzuřený biskup, který obřím svítícím mečem mlátí do neviditelného skleněného stropu a křičí: 'Kde jsou hranice pravdy?!'" },
              { anchor: "Otevřená střecha", concept: "Věda", sensory: "Explodující zkumavka tvořící ohňostroj rovnic.", text: "Konečně rozrazíš dveře na Otevřenou střechu. Uprostřed stojí obrovská zkumavka velikosti rakety. Začne bublat, vařit se a najednou exploduje v nádherný ohňostroj plný zářících rovnic a planet." }
            ]
          },
          {
            id: 2,
            title: "Level 2: Lingvistika a písmo",
            location: "Zarostlá lingvistická knihovna",
            description: "Obrovský skleník kombinovaný se starou knihovnou, kde z knih raší liány a místo prachu se vzduchem vznášejí svítící písmena.",
            rooms: [
              { anchor: "Těžké dubové dveře", concept: "Abjad", sensory: "Oslizlý had požírající souhlásky a plivající samohlásky.", text: "Vyřítí se z nich slizký HAD, který požírá souhlásky, ale s kašláním vyplivuje samohlásky. Je to abjad – písmo bez samohlásek." },
              { anchor: "Zlatý výpůjční pult", concept: "Abugida", sensory: "Zlatý Buddha střídající diakritické kloboučky a zpívající.", text: "Sedí za ním zlatý Buddha a střídá si na hlavě malé diakritické kloboučky. S každým kloboučkem zazpívá jinou samohlásku." },
              { anchor: "Dětský čtecí koutek", concept: "Slabičné písmo", sensory: "Obří žába chytající lepivým jazykem celé slabiky.", text: "Sedí tu obří žába a lepivým jazykem chytá kuličky se spojenými páry souhlásek a samohlásek. Zosobňuje slabičné písmo." },
              { anchor: "Akustická kabina", concept: "Fonetika", sensory: "Řvoucí fén střílející bolestivé zvukové vlny.", text: "Zaútočí na tebe obrovský fén, který střílí fyzické zvukové vlny. Tato fonetika tě bolestivě fackuje přes uši." },
              { anchor: "Lékařský stůl", concept: "Fonologie", sensory: "Doktor s fonendoskopem přesně třídící zvuky do šuplíčků.", text: "Stojí tu doktor s fonendoskopem a pinzetou rozřazuje zvuky do šuplíčků (fonémů). Tato fonologie přesně zkoumá zvukový systém." },
              { anchor: "Koberec posetý Legem", concept: "Morfologie", sensory: "Morfeus zacvakávající nejmenší svítící kostičky (bolest při šlápnutí).", text: "Morfeus tu zacvakává nejmenší svítící kostičky do slov. Bolí to, když na ně šlápneš. Je to morfologie." },
              { anchor: "Obří stavební jeřáb", concept: "Syntax", sensory: "Syn taxikáře kující hotová slova do železných traverz.", text: "Syn taxikáře (syn-tax) jím kove hotová slova do masivních železných traverz. Létají jiskry." },
              { anchor: "Svítící studánka", concept: "Sémantika", sensory: "Semínka, ze kterých po vhození slova vyroste skutečná věc.", text: "Hodíš do ní list se slovem a ze zářících semínek okamžitě vyroste skutečná věc. Zářící voda cáká okolo." },
              { anchor: "Divadelní pódium", concept: "Pragmatika", sensory: "Pračka říkající výmluvy pod neonem, co odhaluje skutečný význam.", text: "Stojí tu automatická pračka, která mrká a říká 'Bolí mě hlava', ale svítí nad ní neon 'NECHCI SEX'. Zkoumá skutečný význam v kontextu." }
            ]
          }
        ];

        // --- HLAVNÍ KOMPONENTA ---
        function App() {
          const [gameState, setGameState] = useState('menu');
          const [currentLevelId, setCurrentLevelId] = useState(1);
          const [currentRoomIndex, setCurrentRoomIndex] = useState(0);
          const [playerHp, setPlayerHp] = useState(3);
          const [bossHp, setBossHp] = useState(0);
          const [unlockedLevels, setUnlockedLevels] = useState(1);
          const [xp, setXp] = useState(0);
          
          const [bossQuestions, setBossQuestions] = useState([]);
          const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
          const [timeLeft, setTimeLeft] = useState(15);
          const [feedback, setFeedback] = useState(null);

          const currentLevel = GAME_DATA.find(l => l.id === currentLevelId);
          const currentRoom = currentLevel?.rooms[currentRoomIndex];

          const getPlayerTitle = () => {
            if (xp < 100) return "Ztracený čtenář";
            if (xp < 250) return "Učeň metadat";
            return "Strážce Booleovy sítě";
          };

          const startBossFight = () => {
            setGameState('boss_intro');
            setPlayerHp(3);
            setBossHp(currentLevel.rooms.length);
            
            const questions = currentLevel.rooms.map(room => {
              const allConcepts = currentLevel.rooms.map(r => r.concept);
              const wrongAnswers = allConcepts.filter(c => c !== room.concept).sort(() => 0.5 - Math.random()).slice(0, 3);
              const options = [room.concept, ...wrongAnswers].sort(() => 0.5 - Math.random());
              
              return { sensory: room.sensory, correct: room.concept, options: options };
            }).sort(() => 0.5 - Math.random());

            setBossQuestions(questions);
            setCurrentQuestionIndex(0);
          };

          const beginBossCombat = () => {
            setGameState('boss_fight');
            setTimeLeft(10);
            setFeedback(null);
          };

          useEffect(() => {
            let timer;
            if (gameState === 'boss_fight' && timeLeft > 0 && !feedback) {
              timer = setTimeout(() => setTimeLeft(timeLeft - 1), 1000);
            } else if (gameState === 'boss_fight' && timeLeft === 0 && !feedback) {
              handleAnswerTimeout();
            }
            return () => clearTimeout(timer);
          }, [timeLeft, gameState, feedback]);

          const handleAnswerTimeout = () => {
            setFeedback({ type: 'error', text: 'Vypršel čas! Monstrum útočí!' });
            processDamage();
          };

          const handleAnswer = (selectedConcept) => {
            if (feedback) return;
            const currentQ = bossQuestions[currentQuestionIndex];
            if (selectedConcept === currentQ.correct) {
              setFeedback({ type: 'success', text: 'Správně! Monstrum slábne!' });
              setBossHp(prev => prev - 1);
              setXp(prev => prev + 15);
              setTimeout(nextQuestion, 1500);
            } else {
              setFeedback({ type: 'error', text: `Špatně! Správně bylo: ${currentQ.correct}` });
              processDamage();
            }
          };

          const processDamage = () => {
            setPlayerHp(prev => prev - 1);
            if (playerHp - 1 <= 0) {
              setTimeout(() => setGameState('game_over'), 1500);
            } else {
              setTimeout(nextQuestion, 2000);
            }
          };

          const nextQuestion = () => {
            setFeedback(null);
            if (currentQuestionIndex + 1 < bossQuestions.length) {
              setCurrentQuestionIndex(prev => prev + 1);
              setTimeLeft(10);
            } else {
              setGameState('victory');
              if (currentLevelId === unlockedLevels && unlockedLevels < GAME_DATA.length) {
                setUnlockedLevels(prev => prev + 1);
              }
              setXp(prev => prev + 50);
            }
          };

          // --- RENDER FUNKCE ---
          const renderMenu = () => (
            <div className="flex flex-col items-center justify-center min-h-screen text-center p-6 space-y-8 animate-fade-in">
              <div className="space-y-2">
                <h1 className="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-500 tracking-tighter">
                  KLEMENTINUM <span className="font-mono">2099</span>
                </h1>
                <p className="text-xl text-slate-400 font-light tracking-widest uppercase">Labyrint poznání</p>
              </div>

              <div className="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 max-w-md w-full backdrop-blur-sm shadow-2xl">
                <div className="flex items-center justify-center space-x-4 mb-4 text-cyan-400">
                  <Terminal size={32} />
                  <h2 className="text-2xl font-bold">Přístupový Terminál</h2>
                </div>
                <p className="text-slate-300 mb-6 text-sm leading-relaxed">
                  Vítej v paměťovém simulátoru ÚISK. Připrav se na multisenzorické kódování informací. 
                  Křivka zapomínání je tvůj jediný nepřítel.
                </p>
                
                <div className="flex justify-between items-center bg-slate-900 rounded-lg p-4 mb-6 border border-slate-800">
                  <div className="text-left">
                    <p className="text-xs text-slate-500 uppercase font-bold">Status studenta</p>
                    <p className="text-fuchsia-400 font-bold">{getPlayerTitle()}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-xs text-slate-500 uppercase font-bold">Zkušenosti</p>
                    <p className="text-cyan-400 font-mono font-bold">{xp} XP</p>
                  </div>
                </div>

                <button onClick={() => setGameState('level_select')} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-6 rounded-lg transition-all duration-300 flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(8,145,178,0.5)]">
                  <Play size={20} /> VSTOUPIT DO SYSTÉMU
                </button>
              </div>
            </div>
          );

          const renderLevelSelect = () => (
            <div className="min-h-screen p-6 max-w-4xl mx-auto animate-fade-in">
              <button onClick={() => setGameState('menu')} className="text-slate-400 hover:text-white mb-8 flex items-center gap-2 transition-colors">
                <ArrowRight size={20} className="rotate-180" /> Zpět do menu
              </button>

              <h2 className="text-3xl font-bold text-white mb-8 border-b border-slate-700 pb-4">Výběr simulace</h2>

              <div className="grid gap-6 md:grid-cols-2">
                {GAME_DATA.map((level) => (
                  <div key={level.id} className={`relative overflow-hidden rounded-xl border ${level.id <= unlockedLevels ? 'border-cyan-500/50 bg-slate-800 hover:border-cyan-400 cursor-pointer transition-all' : 'border-slate-800 bg-slate-900/50 opacity-60 cursor-not-allowed'}`}
                    onClick={() => {
                      if (level.id <= unlockedLevels) {
                        setCurrentLevelId(level.id);
                        setCurrentRoomIndex(0);
                        setGameState('exploring');
                      }
                    }}>
                    {level.id > unlockedLevels && (
                      <div className="absolute inset-0 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm z-10">
                        <p className="text-slate-400 font-mono font-bold tracking-widest flex items-center gap-2">
                          <Shield size={16} /> UZAMČENO
                        </p>
                      </div>
                    )}
                    <div className="p-6">
                      <div className="flex justify-between items-start mb-4">
                        <div className="p-3 rounded-lg bg-slate-900/80 text-cyan-400 border border-slate-700">
                          <Map size={24} />
                        </div>
                        <span className="text-xs font-mono text-slate-500 bg-slate-900 px-2 py-1 rounded">LEVEL 0{level.id}</span>
                      </div>
                      <h3 className="text-xl font-bold text-white mb-2">{level.title}</h3>
                      <p className="text-slate-400 text-sm mb-4 line-clamp-2">{level.description}</p>
                      <div className="flex items-center gap-2 text-xs font-mono text-fuchsia-400">
                        <Brain size={14} /> Metoda Loci: {level.rooms.length} uzlů
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );

          const renderExploration = () => (
            <div className="min-h-screen flex flex-col max-w-3xl mx-auto p-4 md:p-8 animate-fade-in">
              <div className="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div>
                  <p className="text-xs text-slate-400 uppercase font-bold tracking-wider">{currentLevel.title}</p>
                  <p className="text-cyan-400 font-mono font-bold text-sm">{currentLevel.location}</p>
                </div>
                <div className="text-right">
                  <p className="text-xs text-slate-400 uppercase font-bold tracking-wider">Průzkum paláce</p>
                  <p className="text-white font-mono font-bold">{currentRoomIndex + 1} / {currentLevel.rooms.length}</p>
                </div>
              </div>

              <div className="flex-1 flex flex-col justify-center space-y-8">
                <div className="text-center space-y-2">
                  <p className="text-sm font-mono text-fuchsia-500 uppercase tracking-widest flex items-center justify-center gap-2">
                    <Crosshair size={16} /> Prostorová kotva
                  </p>
                  <h2 className="text-3xl md:text-4xl font-black text-white">{currentRoom.anchor}</h2>
                </div>

                <div className="bg-slate-800/80 backdrop-blur-md border-l-4 border-cyan-500 p-6 md:p-8 rounded-r-xl shadow-lg relative overflow-hidden">
                  <div className="absolute top-0 right-0 opacity-5 pointer-events-none">
                    <Brain size={200} className="transform translate-x-1/4 -translate-y-1/4 text-white" />
                  </div>
                  <p className="text-lg md:text-xl text-slate-200 leading-relaxed relative z-10 font-light">
                    {currentRoom.text}
                  </p>
                </div>

                <div className="bg-slate-900 border border-fuchsia-900/50 p-6 rounded-xl flex flex-col md:flex-row items-center gap-6 shadow-[0_0_20px_rgba(217,70,239,0.1)]">
                  <div className="flex-shrink-0 w-16 h-16 flex items-center justify-center bg-fuchsia-950 rounded-full text-fuchsia-400 border border-fuchsia-800">
                    <Zap size={24} />
                  </div>
                  <div className="flex-1 text-center md:text-left">
                    <p className="text-xs text-fuchsia-400/80 uppercase font-bold mb-1">Cílový pojem k zapamatování</p>
                    <h3 className="text-2xl font-bold text-white tracking-wide">{currentRoom.concept}</h3>
                  </div>
                </div>
              </div>

              <div className="mt-8">
                <button onClick={() => {
                    if (currentRoomIndex + 1 < currentLevel.rooms.length) setCurrentRoomIndex(prev => prev + 1);
                    else startBossFight();
                  }}
                  className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-5 rounded-xl transition-all duration-300 text-lg shadow-lg flex justify-center items-center gap-3">
                  {currentRoomIndex + 1 < currentLevel.rooms.length ? (
                    <>ULOŽIT DO PAMĚTI A POKRAČOVAT <ArrowRight size={20} /></>
                  ) : (
                    <>DOKONČIT PRŮZKUM A ČELIT MONSTRU <AlertTriangle size={20} /></>
                  )}
                </button>
              </div>
            </div>
          );

          const renderBossIntro = () => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center animate-pulse-fast bg-red-950/20">
              <AlertTriangle size={80} className="text-red-500 mb-6" />
              <h2 className="text-4xl font-black text-red-500 mb-4 tracking-tighter uppercase">Monstrum zapomínání útočí!</h2>
              <p className="text-xl text-slate-300 max-w-2xl mb-8 leading-relaxed font-light">
                Křivka zapomínání se aktivovala. Monstrum na tebe začne vrhat izolované smyslové vjemy z paláce, který jsi právě prošel. 
                Musíš v časovém limitu vybrat správný pojem, jinak tvé kódování selže!
              </p>
              <button onClick={beginBossCombat} className="bg-red-600 hover:bg-red-500 text-white font-bold py-4 px-12 rounded-lg text-xl shadow-[0_0_30px_rgba(220,38,38,0.6)] transition-all">
                ZAHÁJIT AKTIVNÍ VYBAVOVÁNÍ
              </button>
            </div>
          );

          const renderBossFight = () => {
            const currentQ = bossQuestions[currentQuestionIndex];
            
            return (
              <div className={`min-h-screen flex flex-col p-4 md:p-8 max-w-4xl mx-auto transition-colors duration-300 ${feedback?.type === 'error' ? 'bg-red-950/40' : feedback?.type === 'success' ? 'bg-green-950/40' : ''}`}>
                <div className="flex justify-between items-center mb-8">
                  <div className="flex items-center gap-2">
                    <span className="text-slate-400 font-mono text-sm uppercase">HP Hráče:</span>
                    <div className="flex gap-1">
                      {[...Array(3)].map((_, i) => (
                        <div key={i} className={`w-6 h-6 rounded-full border-2 ${i < playerHp ? 'bg-cyan-500 border-cyan-400 shadow-[0_0_10px_rgba(6,182,212,0.8)]' : 'bg-transparent border-slate-700'}`} />
                      ))}
                    </div>
                  </div>
                  
                  <div className="text-center px-6 py-2 bg-slate-900 border border-slate-700 rounded-full">
                    <span className={`text-2xl font-mono font-bold ${timeLeft <= 3 ? 'text-red-500 animate-pulse' : 'text-fuchsia-400'}`}>
                      00:{timeLeft.toString().padStart(2, '0')}
                    </span>
                  </div>

                  <div className="flex items-center gap-2">
                    <div className="flex gap-1 justify-end">
                      <span className="text-slate-400 font-mono text-sm uppercase mr-2">Monstrum:</span>
                      <span className="text-red-500 font-bold">{bossHp} HP</span>
                    </div>
                  </div>
                </div>

                <div className="flex-1 flex flex-col justify-center items-center mb-8">
                  <p className="text-red-400 font-mono uppercase tracking-widest mb-4 flex items-center gap-2 text-sm">
                    <Zap size={16} /> Útok smyslovým vjemem!
                  </p>
                  <div className="bg-slate-900/80 border-2 border-red-900/50 p-8 rounded-2xl max-w-2xl w-full text-center shadow-2xl relative overflow-hidden">
                    <div className="absolute inset-0 bg-red-500/5 animate-pulse"></div>
                    <h3 className="text-2xl md:text-3xl text-white font-light leading-relaxed relative z-10 italic">
                      "{currentQ.sensory}"
                    </h3>
                  </div>
                </div>

                {feedback && (
                  <div className="absolute inset-0 flex items-center justify-center z-50 pointer-events-none">
                    <div className={`px-8 py-4 rounded-xl border-2 flex items-center gap-4 text-2xl font-black bg-slate-900/95 backdrop-blur-sm ${feedback.type === 'success' ? 'border-green-500 text-green-400' : 'border-red-500 text-red-500'}`}>
                      {feedback.type === 'success' ? <CheckCircle2 size={32} /> : <XCircle size={32} />}
                      {feedback.text}
                    </div>
                  </div>
                )}

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  {currentQ.options.map((opt, idx) => (
                    <button key={idx} onClick={() => handleAnswer(opt)} disabled={feedback !== null}
                      className={`p-6 rounded-xl border-2 text-xl font-bold transition-all duration-200
                        ${feedback && opt === currentQ.correct 
                          ? 'bg-green-900/50 border-green-500 text-green-300' 
                          : feedback && opt !== currentQ.correct
                            ? 'bg-slate-900/50 border-slate-800 text-slate-600'
                            : 'bg-slate-800 border-slate-600 text-slate-200 hover:border-cyan-500 hover:bg-slate-700 hover:shadow-[0_0_15px_rgba(6,182,212,0.3)]'
                        }
                      `}>
                      {opt}
                    </button>
                  ))}
                </div>
                <div className="mt-6 text-center text-slate-500 font-mono text-xs">Vybavování: {currentQuestionIndex + 1} / {bossQuestions.length}</div>
              </div>
            );
          };

          const renderGameOver = () => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-red-950/30">
              <h2 className="text-6xl font-black text-red-600 mb-4 tracking-widest">SYNAPSE PŘERUŠENA</h2>
              <p className="text-xl text-slate-400 mb-12 max-w-lg">
                Monstrum zapomínání zvítězilo. Kódování informací selhalo a znalosti se rozplynuly v entropii.
              </p>
              <button onClick={() => setGameState('level_select')} className="bg-transparent border-2 border-red-600 text-red-500 hover:bg-red-600 hover:text-white font-bold py-4 px-8 rounded-lg transition-colors">
                NÁVRAT DO MENU A NOVÝ POKUS
              </button>
            </div>
          );

          const renderVictory = () => (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-cyan-950/20">
              <div className="mb-8 relative">
                <Brain size={100} className="text-cyan-400 relative z-10" />
                <div className="absolute inset-0 bg-cyan-400 blur-[50px] opacity-30 z-0 rounded-full animate-pulse"></div>
              </div>
              <h2 className="text-5xl font-black text-white mb-4">KÓDOVÁNÍ ÚSPĚŠNÉ</h2>
              <p className="text-xl text-cyan-200 mb-2">Porazil jsi křivku zapomínání!</p>
              <p className="text-slate-400 mb-12">Získal jsi +50 XP za dokončení paláce.</p>
              
              <button onClick={() => setGameState('level_select')} className="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 px-12 rounded-lg text-lg shadow-[0_0_20px_rgba(8,145,178,0.5)] transition-all">
                POKRAČOVAT V SIMULACI
              </button>
            </div>
          );

          return (
            <React.Fragment>
              {gameState === 'menu' && renderMenu()}
              {gameState === 'level_select' && renderLevelSelect()}
              {gameState === 'exploring' && renderExploration()}
              {gameState === 'boss_intro' && renderBossIntro()}
              {gameState === 'boss_fight' && renderBossFight()}
              {gameState === 'game_over' && renderGameOver()}
              {gameState === 'victory' && renderVictory()}
            </React.Fragment>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
